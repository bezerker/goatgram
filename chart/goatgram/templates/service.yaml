apiVersion: v1
kind: Service
metadata:
  name: {{ include "goatgram.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: goatgram
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    app: goatgram
